[pytest]
# Pytest configuration for Phase 1 feature tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=ai_inference_gateway
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    slow: Slow tests (should be run infrequently)
    asyncio: Async tests (requires async test execution)
    requires_redis: Tests that require Redis service
    requires_qdrant: Tests that require Qdrant service
    requires_network: Tests that require network access

# Test paths
testpaths = tests

# Coverage options
[coverage:run]
source = ai_inference_gateway
omit =
    */tests/*
    */__pycache__/*
    */migrations/*
    */venv/*
    .venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
