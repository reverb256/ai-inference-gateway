  - name: npm
    engine: npm
    disabled: false
    categories: [it]

  - name: pypi
    engine: pypi
    disabled: false
    categories: [it]

# ============================================================================
# CATEGORIES AS TABS (UI organization)
# ============================================================================

categories_as_tabs:
  general:
    - 'general'

  images:
    - 'images'

  videos:
    - 'videos'

  news:
    - 'news'

  it:
    - 'it'

  science:
    - 'science'

  social:
    - 'social'

# ============================================================================
# OUTGOING REQUEST CONFIGURATION (Performance optimization)
# ============================================================================

outgoing:
  # Connection pooling for high concurrency
  pool_connections: 100        # Number of connection pools to cache
  pool_maxsize: 100            # Maximum number of connections in pool
  keepalive_expiry: 5.0        # Keepalive connections expire after 5 seconds

  # Enable HTTP/2 for better performance
  enable_http2: true

  # Retry configuration
  retries: 2
  retry_on_http_error: [403, 429, 500, 502, 503, 504]

  # Timeouts
  request_timeout: 5.0
  max_request_timeout: 10.0

  # User agent
  useragent: "Mozilla/5.0 (compatible; SearXNG-AI/1.0; +https://github.com/searxng/searxng)"

# ============================================================================
# RATE LIMITING & BOT PROTECTION
# ============================================================================

limiter: true
botdetection:
  # No IP limit for local AI agents
  ip_limit: 0

  # Token limit (disabled for internal use)
  # token_limit: 0

  # Disable link token verification (was blocking MCP gateway requests)
  link_token: false

# ============================================================================
# REDIS/VALKEY CONFIGURATION (Persistent caching)
# ============================================================================

# Uncomment and configure when Redis/Valkey is available
# redis:
#   url: "redis://localhost:6379/0"

# valkey:
#   url: "valkey://localhost:6379/0"

# ============================================================================
# PLUGINS (Built-in extensions)
# ============================================================================

plugins:
  - 'Tracker URL remover'
  - 'Self HTTPS'
  - 'Infinite scroll'
  - 'Hash password'
  - 'Autodetect search language'
  - 'SketchFab-embeddings'
  - 'Vim-like hotkeys'
  - 'Tor check'

# ============================================================================
# UI CONFIGURATION
# ============================================================================

ui:
  static_path: "/usr/local/searxng/searxng/static"
  templates_path: "/usr/local/searxng/searxng/templates"

  # Themes
  theme_args:
    simple_style: "auto"

  # Results per page
  results_on_new_tab: false

  # Infinite scroll
  infinite_scroll: true

  # Search URL
  search_url: "/"

  # Proxy settings
  image_proxy: true

  # Center alignment
  center_alignment: true

# ============================================================================
# BRAND CONFIGURATION
# ============================================================================

brand:
  documents:
    browse:
      url: "https://github.com/searxng/searxng/issues"
      text: "Issue tracker"
      aria_label: "View issue tracker on GitHub"

    about:
      url: "https://docs.searxng.org"
      text: "About SearXNG"
      aria_label: "Learn more about SearXNG"

    blog:
      url: "https://searxng.org/blog"
      text: "Blog"
      aria_label: "View SearXNG blog"

    donate:
      url: "https://searxng.org/donate"
      text: "Donate"
      aria_label: "Donate to SearXNG project"

    contact:
      url: "mailto:admin@local"
      text: "Contact"
      aria_label: "Contact SearXNG administrators"
