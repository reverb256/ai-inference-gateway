# SearXNG Configuration for AI Inference Gateway
# Optimized for multi-domain AI search with enhanced engine coverage

use_default_settings: true

general:
  debug: false
  instance_name: "Zephyr AI Search"
  contact:
    mail: "admin@local"

# Enable comprehensive search formats for AI consumption
search:
  safe_search: 0
  autocomplete: 'duckduckgo'
  default_lang: "auto"
  formats:
    - html
    - json
    - csv

# Server performance and security
server:
  # Is overwritten by ${SEARXNG_SECRET} in production
  secret_key: "CHANGE_THIS_IN_PRODUCTION"

  # Enable rate limiting and bot protection
  limiter: true
  image_proxy: true

  # Performance settings
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: "nosniff"
    X-Frame-Options: "SAMEORIGIN"
    X-XSS-Protection: "1; mode=block"

# ============================================================================
# ENGINE CONFIGURATION - Optimize for AI Workflows
# ============================================================================

engines:
  # ========================================================================
  # GENERAL SEARCH ENGINES (Primary web search)
  # ========================================================================

  - name: google
    engine: google
    disabled: false
    weight: 2.0  # Higher weight for primary engine

  - name: bing
    engine: bing
    disabled: false
    weight: 1.5

  - name: duckduckgo
    engine: duckduckgo
    disabled: false
    weight: 1.5

  - name: brave
    engine: brave
    disabled: false
    weight: 1.0

  - name: startpage
    engine: startpage
    disabled: false
    weight: 1.0

  # ========================================================================
  # CODE & DEVELOPMENT ENGINES
  # ========================================================================

  - name: github
    engine: github
    disabled: false
    weight: 2.0
    categories: [it, general]

  - name: gitlab
    engine: gitlab
    disabled: false
    weight: 1.5
    categories: [it, general]

  - name: stackoverflow
    engine: stackoverflow
    disabled: false
    weight: 2.0
    categories: [it, general]

  - name: stackexchange
    engine: stackexchange
    disabled: false
    weight: 1.5
    categories: [it, general]

  - name: debian
    engine: debian
    disabled: false
    categories: [it, general]

  - name: arch linux wiki
    engine: archlinux
    disabled: false
    categories: [it, general]

  - name: gentoo
    engine: gentoo
    disabled: false
    categories: [it, general]

  - name: fedora
