    disabled: false
    weight: 2.0
    categories: [science, general]

  - name: semantic scholar
    engine: semantic_scholar
    disabled: false
    weight: 1.5
    categories: [science, general]

  - name: arxiv
    engine: arxiv
    disabled: false
    weight: 2.0
    categories: [science, general]

  - name: pubmed
    engine: pubmed
    disabled: false
    weight: 1.5
    categories: [science, general]

  - name: crossref
    engine: crossref
    disabled: false
    weight: 1.0
    categories: [science, general]

  - name: doaj
    engine: doaj
    disabled: false
    weight: 1.0
    categories: [science, general]

  - name: base
    engine: base
    disabled: false
    weight: 1.0
    categories: [science, general]

  # ========================================================================
  # DOCUMENTATION & REFERENCE ENGINES
  # ========================================================================

  - name: wikipedia
    engine: wikipedia
    disabled: false
    weight: 1.5
    categories: [general]

  - name: wikidata
    engine: wikidata
    disabled: false
    categories: [general]

  - name: dictzone
    engine: dictzone
    disabled: false
    categories: [general]

  # ========================================================================
  # SOCIAL & COMMUNITY ENGINES
  # ========================================================================

  - name: reddit
    engine: reddit
    disabled: false
    weight: 1.5
    categories: [social, general]

  - name: twitter
    engine: twitter
    disabled: false
    weight: 1.0
    categories: [social, general]

  - name: mastodon
    engine: mastodon
    disabled: false
    categories: [social, general]

  # ========================================================================
  # MULTILINGUAL SEARCH (for comprehensive results)
  # ========================================================================

  - name: google english
    engine: google
    language: en
    disabled: false
    weight: 1.0

  - name: google german
    engine: google
    language: de
    disabled: false
    weight: 0.5

  - name: google french
    engine: google
    language: fr
    disabled: false
    weight: 0.5

  - name: google spanish
    engine: google
    language: es
    disabled: false
    weight: 0.5

  # ========================================================================
  # CONTENT-SPECIFIC ENGINES
  # ========================================================================

